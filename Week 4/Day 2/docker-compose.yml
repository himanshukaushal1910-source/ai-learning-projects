# NovaMind RAG API — docker-compose.yml
# =======================================
# docker-compose orchestrates multiple containers as one system.
# This file defines two services: qdrant (database) and app (our FastAPI).
# One command starts both: docker-compose up
# One command stops both: docker-compose down

version: "3.9"

services:

  # ============================================================
  # SERVICE 1: Qdrant vector database
  # We pull the official Qdrant image — no Dockerfile needed.
  # ============================================================
  qdrant:
    image: qdrant/qdrant        # pull official image from Docker Hub
    ports:
      - "6333:6333"             # host_port:container_port
                                # left = your machine, right = inside container
                                # allows you to also access Qdrant directly at localhost:6333
    volumes:
      - qdrant_storage:/qdrant/storage
                                # mount a named volume at Qdrant's data directory
                                # vectors written here survive container restarts
                                # without this line, all vectors are lost on restart

  # ============================================================
  # SERVICE 2: Our FastAPI RAG application
  # We build this from our Dockerfile instead of pulling an image.
  # ============================================================
  app:
    build: .                    # build image from Dockerfile in current directory
    ports:
      - "8000:8000"             # expose FastAPI on localhost:8000
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
                                # inject GROQ_API_KEY from your Windows environment
                                # ${GROQ_API_KEY} reads from host machine env vars
                                # your key is never written in this file
    depends_on:
      - qdrant                  # start qdrant container BEFORE app container
                                # because app tries to connect to qdrant at startup
    # The app connects to qdrant using the service name "qdrant" as hostname.
    # Docker creates an internal network and registers each service by name.
    # QdrantClient("qdrant", port=6333) resolves to the qdrant container's IP.

# ============================================================
# VOLUMES
# Named volumes are managed by Docker — they persist on your machine
# even when containers stop or are removed.
# docker-compose down does NOT delete volumes.
# docker-compose down -v DOES delete volumes (use carefully).
# ============================================================
volumes:
  qdrant_storage:               # declares the named volume used above
